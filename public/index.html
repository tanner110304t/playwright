<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Environmental Sensor Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- HEADER -->
    <header>
      <h1>Environmental Sensor Dashboard</h1>
      <p>Live readings from all active monitoring stations</p>
    </header>

    <!-- MAIN CONTENT -->
    <main>

      <!-- SENSOR LIST SECTION -->
      <section id="sensors-section">
        <h2>Active Sensors</h2>
        <div id="sensors-container">
          <p id="loading-message">Loading sensors...</p>
        </div>
      </section>

      <!-- DIVIDER -->
      <hr />

      <!-- SUBMIT READING SECTION -->
      <section id="reading-section">
        <h2>Submit a New Reading</h2>
        <p>Enter a sensor ID and a new value to update its reading.</p>

        <div class="form-group">
          <label for="sensor-id-input">Sensor ID</label>
          <input
            type="text"
            id="sensor-id-input"
            placeholder="e.g. sensor-001"
          />
        </div>

        <div class="form-group">
          <label for="reading-value-input">Reading Value</label>
          <input
            type="text"
            id="reading-value-input"
            placeholder="e.g. 55"
          />
        </div>

        <button id="submit-reading-btn">Submit Reading</button>

        <!-- SUCCESS OR ERROR MESSAGE APPEARS HERE -->
        <div id="message-container"></div>

      </section>

    </main>

    <!-- FOOTER -->
    <footer>
      <p>Environmental Monitoring System — QET Practice Project</p>
    </footer>

    <!-- LOAD SCRIPT LAST -->
    <script src="script.js"></script>

  </body>
</html>
